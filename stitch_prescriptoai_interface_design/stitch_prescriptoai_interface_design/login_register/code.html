<div class="absolute bottom-[-10%] left-[-5%] w-[500px] h-[500px] bg-primary opacity-5 blur-[120px] rounded-full"></div>
<main class="w-full max-w-md z-10">
<!-- Brand Identity -->
<div class="text-center mb-10 space-y-3">
<div class="flex justify-center mb-4">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center shadow-[0_8px_30px_rgba(0,103,126,0.2)]">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
</div>
<h1 class="font-headline font-black text-4xl tracking-tight text-primary uppercase">
                PrescriptoAI
            </h1>
<p class="font-body text-on-surface-variant font-medium text-sm tracking-wide">
                Smart prescription digitization powered by AI
            </p>
</div>
<!-- Glassmorphism Card -->
<div class="glass-card rounded-[40px] p-8 md:p-10 shadow-[0_32px_64px_-16px_rgba(0,0,0,0.08)] relative overflow-hidden border border-white/40">
<!-- Subtle internal flare -->
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-container/10 blur-3xl rounded-full translate-x-10 -translate-y-10"></div>
<form class="space-y-6 relative z-10">
<!-- Input Group: Email/Phone -->
<div class="space-y-2">
<label class="font-label text-[11px] font-bold uppercase tracking-[0.15em] text-outline ml-4">Identifier</label>
<div class="group relative input-glow transition-all duration-300 rounded-full">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-xl">alternate_email</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pl-14 pr-6 text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all" placeholder="Email or Phone Number" type="text"/>
</div>
</div>
<!-- Input Group: Password -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-4 mr-2">
<label class="font-label text-[11px] font-bold uppercase tracking-[0.15em] text-outline">Password</label>
<a class="font-label text-[10px] font-bold uppercase tracking-wider text-primary hover:text-on-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="group relative input-glow transition-all duration-300 rounded-full">
<div class="absolute inset-y-0 left-5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors text-xl">lock</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-full py-4 pl-14 pr-6 text-on-surface placeholder:text-outline-variant focus:ring-1 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-4">
<input class="w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary-container focus:ring-offset-0 bg-surface-container-low transition-all" id="remember" type="checkbox"/>
<label class="ml-3 font-body text-sm text-on-surface-variant font-medium" for="remember">Keep me logged in</label>
</div>
<!-- CTA Actions -->
<div class="pt-4 space-y-6">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg py-4 rounded-full shadow-[0_12px_24px_-6px_rgba(0,103,126,0.4)] hover:shadow-[0_16px_32px_-8px_rgba(0,103,126,0.6)] active:scale-[0.98] transition-all relative overflow-hidden group" type="submit">
<span class="relative z-10">Login</span>
<div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity"></div>
<!-- Inner Glow Effect -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-white/20"></div>
</button>
<div class="flex flex-col items-center space-y-4">
<p class="font-body text-sm text-on-surface-variant">Don't have an account yet?</p>
<button class="w-full bg-surface-container-high text-on-surface font-label font-bold text-sm tracking-widest uppercase py-4 rounded-full hover:bg-surface-container-highest transition-colors active:scale-[0.98]" type="button">
                            Create Account
                        </button>
</div>
</div>
</form>
</div>

<span class="w-1.5 h-1.5 rounded-full bg-secondary shadow-[0_0_8px_#68fadd]"></span>
<span>System Operational</span>
</div>
</div>

</div>
</div>
<div class="absolute -bottom-8 -left-12 glass-card p-4 rounded-2xl border border-white/40 shadow-lg transform -rotate-6">
<span class="material-symbols-outlined text-secondary-fixed-dim text-4xl" style="font-variation-settings: 'FILL' 1;">pill</span>
</div>
